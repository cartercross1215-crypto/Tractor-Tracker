services:
  - type: web
    name: tractor-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: TRACTOR_TRACKER_DATA_DIR
        value: /data
      - key: TRACTOR_TRACKER_PUBLIC_URL
        value: https://tractor-tracker-yboz.onrender.com
      - key: TRACTOR_TRACKER_SUPPORT_EMAIL
        value: carterc.issa@gmail.com
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
    disk:
      name: tractor-tracker-data
      mountPath: /data
      sizeGB: 1
