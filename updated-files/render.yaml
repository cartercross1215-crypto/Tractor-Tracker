services:
  - type: web
    name: tractor-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: TRACTOR_TRACKER_DATA_DIR
        value: /data
    disk:
      name: tractor-tracker-data
      mountPath: /data
      sizeGB: 1
